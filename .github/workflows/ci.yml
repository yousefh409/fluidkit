name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 24]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run check:ssr
      - run: npm run typecheck:site
      # Use `npx size-limit` directly instead of `npm run size` (which runs
      # `build && size-limit`) — the build step above already produced dist/,
      # so re-running it here would be redundant.
      - run: npx size-limit
      - run: npm run check:gpu-leak
      - run: npm run check:pack
